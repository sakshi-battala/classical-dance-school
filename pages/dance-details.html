<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dance-details.css" />
  </head>
  <body>
    <section class="dance-details-section">
      <div class="container">
        <div class="dance-details-card">
          <!-- IMAGE -->

          <div class="dance-image-wrapper">
            <img id="danceImage" alt="" />
          </div>

          <!-- CONTENT -->

          <div class="dance-content">
            <p class="details-subtitle">CLASSICAL DANCE FORM</p>

            <h1 id="danceTitle"></h1>

            <div class="details-box">
              <h3>Description</h3>
              <p id="danceDescription"></p>
            </div>

            <div class="details-box">
              <h3>History</h3>
              <p id="danceHistory"></p>
            </div>

            <div class="details-box">
              <h3>Core Techniques</h3>
              <p id="danceCoreTechniques"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="../js/dance-details.js"></script>
  </body>
</html>
